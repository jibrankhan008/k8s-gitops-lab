apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: myapp

  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/jibrankhan008/k8s-gitops-lab.git
  
    targetRevision: main
  
    path: myapp

  destination:
    server: https://kubernetes.default.svc
    
    namespace: dev-myapp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
